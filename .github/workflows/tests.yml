name: Tests

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPILERCHECK: content
      CCACHE_BASEDIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install native build cache/tools
        run: sudo apt-get update && sudo apt-get install -y ccache ninja-build
      - run: bun install
      - name: Cache tools
        uses: actions/cache@v5
        with:
          path: ./.tools
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}
      - name: Cache C++ compiler outputs
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('go.sum', 'CMakeLists.txt', 'srpc/CMakeLists.txt', 'srpc/**/*.cpp', 'srpc/**/*.hpp', 'srpc/**/*.cc', 'srpc/**/*.h', 'echo/**/*.cpp', 'echo/**/*.hpp', 'integration/cross-language/*.cpp', 'rpcstream/**/*.cpp', 'rpcstream/**/*.hpp', '**/*.pb.cc', '**/*.pb.h') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      - name: Zero ccache stats
        run: ccache --zero-stats || true
      - run: go mod vendor
      - run: bun run build
      - run: bun run go:aptre -- test
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --all-features
      - run: bun run test:js
      - run: bun run test:cpp
      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
      - run: bun run lint:js
      - run: bun run lint:go
      - run: bun run integration
      - run: bun run deps
